name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend-test:
    name: Backend test + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create data directory
        working-directory: backend
        run: mkdir -p data

      - name: Run backend tests
        working-directory: backend
        run: |
          python -m pytest -q

      - name: Format / lint backend (optional)
        working-directory: backend
        run: |
          # optional: add black/isort if configured
          echo "No backend linter configured"

  frontend-test:
    name: Frontend test + lint
    runs-on: ubuntu-latest
    needs: backend-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: frontend
        run: |
          npm ci

      - name: Run frontend lint
        working-directory: frontend
        run: |
          npm run lint --if-present

      - name: Run frontend tests (if available)
        working-directory: frontend
        run: |
          npm test --if-present

  deploy:
    name: Deploy (if branch main and setup)
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy placeholder
        run: |
          echo "Add your deploy steps here (e.g., upload to Render/Vercel/Cloud)"
          echo "Set secrets: API_KEY, API_SECRET, etc."
